# 중앙 설정 파일의 Kubernetes 버전. 모든 값 공란 - 운영 시 채운다.
# 생성: kubectl -n monitoring create secret generic monitoring-config --from-env-file=.env
# (또는 이 파일을 복사해 stringData를 채운 뒤 kubectl apply)
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-config
  namespace: monitoring
type: Opaque
stringData:
  LISTEN_ADDR: ":8080"

  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""
  SLACK_ALERT_CHANNEL: ""
  SLACK_BASE_URL: ""

  GRAFANA_BASE_URL: ""
  GRAFANA_API_TOKEN: ""

  KUBE_API_URL: ""
  KUBE_TOKEN: ""
  KUBE_INSECURE_SKIP_VERIFY: "false"

  GITHUB_BASE_URL: ""
  GITHUB_TOKEN: ""

  ARGOCD_BASE_URL: ""
  ARGOCD_TOKEN: ""
  ARGOCD_ROLLBACK_ENABLED: "false"

  LOG_SOURCE: "kibana"
  KIBANA_BASE_URL: ""
  PROMETHEUS_BASE_URL: ""
